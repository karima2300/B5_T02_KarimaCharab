name: Generar documentació

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar repositori
        uses: actions/checkout@v4
      
      - name: Instal·lar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Generar documentació
        run: |
          python3 -m pydoc -w calculadora.py
          python3 -m pydoc -w gestio_llibre.py
          python3 -m pydoc -w validacions.py
          mkdir -p docs
          mv calculadora.html docs/
          mv gestio_llibre.html docs/
          mv validacions.html docs/
          echo "Documentació generada correctament"
      
      - name: Pujar documentació
        uses: actions/upload-artifact@v4
        with:
          name: documentacio
          path: docs/
