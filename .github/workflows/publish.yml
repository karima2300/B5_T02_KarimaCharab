name: Publicar a GitHub Pages

on:
  workflow_run:
    workflows: ["Generar documentació"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Clonar repositori
        uses: actions/checkout@v4
      
      - name: Crear branch gh-pages
        run: |
          git checkout --orphan gh-pages
          git rm -rf .
          echo "# Documentació" > README.md
          git add README.md
          git commit -m "Inicialitzar gh-pages"
          git push origin gh-pages --force
      
      - name: Descarregar documentació
        uses: actions/download-artifact@v4
        with:
          name: documentacio
          path: docs/
      
      - name: Publicar a gh-pages
        run: |
          git checkout gh-pages
          rm -rf *
          cp -r docs/* .
          git add .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Actualitzar documentació" || echo "No canvis"
          git push origin gh-pages
